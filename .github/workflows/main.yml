name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  frontend-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        working-directory: ./showu-frontend
        run: npm install

      - name: Build Next.js
        working-directory: ./showu-frontend
        run: |
          export NEXT_TELEMETRY_DISABLED=1
          NEXT_DISABLE_ESLINT=1 NEXT_DISABLE_TYPECHECK=1 npx next build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_SHOWU }}'
          channelId: live
          projectId: showu-8339b
          entryPoint: .